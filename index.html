<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BPM Analyzer Pro OVERKILL</title>
    <style>
        body { background: #000000; color: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        /* 限界突破感を出すため、ブラック×ゴールド系のデザインに */
        .card { background: #0a0a0a; padding: 1.5rem; border-radius: 1.5rem; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 0 40px rgba(250, 204, 21, 0.15); border: 1px solid #3f3f46; }
        .bpm-container { margin: 5px 0 15px 0; background: #18181b; padding: 15px; border-radius: 12px; border: 1px solid #3f3f46; position: relative; }
        .bpm-display { font-size: 70px; font-weight: 900; color: #facc15; text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); font-variant-numeric: tabular-nums; line-height: 1; }
        .bpm-double { font-size: 1.5rem; color: #a1a1aa; font-weight: bold; margin-top: 8px; font-variant-numeric: tabular-nums; }
        .status-badge { display: inline-block; padding: 4px 12px; background: #422006; border-radius: 20px; font-size: 0.75rem; color: #fef08a; border: 1px solid #854d0e; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        canvas { width: 100%; background: #18181b; border-radius: 8px; border: 1px solid #3f3f46; display: block; }
        #canvas { height: 60px; margin-bottom: 5px; }
        #visualizer { height: 70px; margin-bottom: 10px; }
        .progress-container { width: 100%; height: 6px; background: #27272a; border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: #facc15; transition: 0.1s; }
        .controls { background: #18181b; padding: 10px; border-radius: 8px; margin-bottom: 8px; text-align: left; }
        input[type=range] { width: 100%; height: 25px; accent-color: #facc15; margin: 0; }
        .slider-label-row { display:flex; justify-content:space-between; font-size:0.75rem; color:#a1a1aa; margin-bottom:3px; }
        button { background: #facc15; color: #000000; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 1.1rem; cursor: pointer; }
        #resetBtn { background: #3f3f46; color: #ffffff; margin-top: 5px; padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup">
        <h2 style="margin-bottom:5px; color:#facc15;">BPM Mic OVERKILL</h2>
        <p style="color:#a1a1aa; font-size:0.8rem; margin-bottom:15px;">全帯域スペクトラル解析 (高負荷)</p>
        <button id="startBtn">🎤 限界精度で測定開始</button>
    </div>

    <div id="ui" style="display:none">
        <div id="status" class="status-badge">SPECTRAL FLUX ENGINE</div>
        
        <div class="bpm-container">
            <div class="bpm-display" id="bpm">--.-</div>
            <div class="bpm-double" id="bpmDouble">x2: --.-</div>
        </div>
        
        <div class="controls">
            <div class="slider-label-row">
                <span>🎙️ 入力音量 (Gain)</span>
                <span id="volumeLabel">x1.0</span>
            </div>
            <input type="range" id="volumeSlider" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>

        <div class="controls">
            <div class="slider-label-row">
                <span>⏱️ 解析バッファ</span>
                <span id="bufferLabel">6s</span>
            </div>
            <input type="range" id="bufferSlider" min="4" max="12" step="1" value="6">
        </div>

        <canvas id="canvas"></canvas>
        <canvas id="visualizer"></canvas>

        <div class="progress-container"><div id="progressBar"></div></div>

        <button id="resetBtn" onclick="location.reload()">終了 / リセット</button>
    </div>
</div>

<script>
    let audioCtx, analyser, dataArray, gainNode;
    
    // ブラウザのタイマーの限界値に近い 250Hz (4ms) サンプリング
    const SAMPLE_FREQ = 250; 
    let historySec = 6; // デフォルトを6秒に延長（精度向上のため）
    let energyLog = [];
    let lastUpdate = 0;
    
    // 【極限精度用】 全ての周波数帯域の直前の音量を記憶する配列
    let prevSpectrum = new Uint8Array(2048);
    
    let currentDisplayBPM = 0;
    let bpmHistory = []; 
    const BPM_HISTORY_SIZE = 3; 

    const startBtn = document.getElementById('startBtn');
    const bufferSlider = document.getElementById('bufferSlider');
    const volumeSlider = document.getElementById('volumeSlider');

    const visCanvas = document.getElementById('visualizer');
    const ctxVis = visCanvas.getContext('2d');
    const canvas = document.getElementById('canvas');
    const ctxWave = canvas.getContext('2d');

    const bandColors = ['#ec4899', '#f59e0b', '#10b981', '#38bdf8'];

    function adjustCanvasResolution(c, ctx) {
        const dpr = window.devicePixelRatio || 1;
        const rect = c.getBoundingClientRect();
        c.width = rect.width * dpr;
        c.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        return { width: rect.width, height: rect.height };
    }

    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ui').style.display = 'block';

            adjustCanvasResolution(canvas, ctxWave);
            adjustCanvasResolution(visCanvas, ctxVis);

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            
            gainNode = audioCtx.createGain();
            gainNode.gain.value = parseFloat(volumeSlider.value);

            analyser = audioCtx.createAnalyser();
            // 【極限精度】 FFTサイズを4096に倍増 (2048ビン)
            analyser.fftSize = 4096; 
            
            source.connect(gainNode);
            gainNode.connect(analyser);

            dataArray = new Uint8Array(analyser.frequencyBinCount);
            prevSpectrum = new Uint8Array(analyser.frequencyBinCount);

            setInterval(analyze, 1000 / SAMPLE_FREQ);
            draw();
        } catch (err) {
            alert("マイクの使用が拒否されました。設定を確認してください。");
        }
    };

    volumeSlider.oninput = (e) => {
        const val = parseFloat(e.target.value);
        document.getElementById('volumeLabel').textContent = "x" + val.toFixed(1);
        if (gainNode) gainNode.gain.value = val;
    };

    bufferSlider.oninput = (e) => {
        historySec = parseInt(e.target.value);
        document.getElementById('bufferLabel').textContent = historySec + "s";
        const maxLen = SAMPLE_FREQ * historySec;
        if (energyLog.length > maxLen) {
            energyLog = energyLog.slice(energyLog.length - maxLen);
        }
        bpmHistory = []; 
    };

    function analyze() {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);

        // 【極限精度】 マルチバンド・スペクトラル・フラックス
        // 低域〜中高域 (約20Hz〜4kHz) までの200個の帯域をすべて個別に比較
        let flux = 0;
        for (let i = 2; i < 200; i++) {
            let diff = dataArray[i] - prevSpectrum[i];
            // 音が大きくなった帯域のエネルギーだけを合算する
            if (diff > 0) {
                flux += diff;
            }
            // 今回のスペクトルを保存して次回に備える
            prevSpectrum[i] = dataArray[i];
        }

        // 小さなノイズを圧縮し、強いアタックを際立たせる
        flux = Math.pow(flux, 1.2);
        
        energyLog.push(flux);

        const maxLen = SAMPLE_FREQ * historySec;
        if (energyLog.length > maxLen) energyLog.shift();

        document.getElementById('progressBar').style.width = (energyLog.length / maxLen * 100) + "%";

        const minRequiredLen = SAMPLE_FREQ * 3; // 最低3秒は待つ
        
        if (energyLog.length >= minRequiredLen && Date.now() - lastUpdate > 1000) {
            calcBPM();
            lastUpdate = Date.now();
        }
    }

    function getCorrelation(normalized, bpm) {
        let step = (60 / bpm) * SAMPLE_FREQ;
        let corr = 0;
        let count = 0;
        for (let i = 0; i < normalized.length - Math.ceil(step); i++) {
            let j = i + step;
            let i1 = Math.floor(j), i2 = Math.ceil(j), frac = j - i1;
            let val = normalized[i1] * (1 - frac) + normalized[i2] * frac;
            corr += normalized[i] * val;
            count++;
        }
        return count > 0 ? corr / count : 0;
    }

    function calcBPM() {
        const mean = energyLog.reduce((a, b) => a + b, 0) / energyLog.length;
        const normalized = energyLog.map(v => v - mean);

        let correlations = [];
        
        // 負荷を無視して、全範囲を総当たり計算
        for (let bpm = 60; bpm <= 182; bpm++) {
            correlations[bpm] = getCorrelation(normalized, bpm);
        }

        let coarseBPM = 0;
        let maxPeakCorr = -Infinity;

        for (let bpm = 61; bpm <= 180; bpm++) {
            if (correlations[bpm] > correlations[bpm - 1] && correlations[bpm] > correlations[bpm + 1]) {
                if (correlations[bpm] > maxPeakCorr) {
                    maxPeakCorr = correlations[bpm];
                    coarseBPM = bpm;
                }
            }
        }

        if (coarseBPM === 0) return;

        let bestBPM = coarseBPM;
        let maxCorr = -Infinity;

        // 【極限精度】 探索ステップを 0.02 刻みに細分化 (超高負荷)
        for (let bpm = coarseBPM - 1; bpm <= coarseBPM + 1; bpm += 0.02) {
            let corr = getCorrelation(normalized, bpm);
            if (corr > maxCorr) {
                maxCorr = corr;
                bestBPM = bpm;
            }
        }

        bpmHistory.push(bestBPM);
        if (bpmHistory.length > BPM_HISTORY_SIZE) {
            bpmHistory.shift();
        }
        let sortedHistory = [...bpmHistory].sort((a, b) => a - b);
        let medianBPM = sortedHistory[Math.floor(sortedHistory.length / 2)];

        if (currentDisplayBPM === 0 || Math.abs(currentDisplayBPM - medianBPM) > 15) {
            currentDisplayBPM = medianBPM;
        } else {
            // ここまで来たらデッドゾーンも0.2と厳しめに設定
            if (Math.abs(currentDisplayBPM - medianBPM) < 0.2) {
                // デッドゾーン維持
            } else {
                currentDisplayBPM = (currentDisplayBPM * 0.8) + (medianBPM * 0.2);
            }
        }

        document.getElementById('bpm').textContent = currentDisplayBPM.toFixed(1);
        document.getElementById('bpmDouble').textContent = "x2: " + (currentDisplayBPM * 2).toFixed(1);
        
        document.getElementById('status').textContent = "LOCKED";
        document.getElementById('status').style.color = "#facc15";
        document.getElementById('status').style.borderColor = "#facc15";
    }

    function fillRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.fill();
    }

    function draw() {
        requestAnimationFrame(draw);
        if (!analyser) return;

        const waveCanvasLogical = { width: canvas.width / (window.devicePixelRatio || 1), height: canvas.height / (window.devicePixelRatio || 1) };
        const visCanvasLogical = { width: visCanvas.width / (window.devicePixelRatio || 1), height: visCanvas.height / (window.devicePixelRatio || 1) };

        ctxWave.clearRect(0, 0, waveCanvasLogical.width, waveCanvasLogical.height);
        ctxWave.beginPath();
        ctxWave.strokeStyle = "#facc15"; // ゴールド
        ctxWave.lineWidth = 1.5;

        const maxLen = SAMPLE_FREQ * historySec;
        const waveStep = waveCanvasLogical.width / maxLen;
        const maxDrawEnergy = Math.max(...energyLog, 1);
        
        for (let i = 0; i < energyLog.length; i++) {
            let y = waveCanvasLogical.height - (energyLog[i] / maxDrawEnergy * waveCanvasLogical.height * 0.9);
            y = Math.max(0, Math.min(waveCanvasLogical.height, y));
            
            if (i === 0) ctxWave.moveTo(0, y);
            else ctxWave.lineTo(i * waveStep, y);
        }
        ctxWave.stroke();

        analyser.getByteFrequencyData(dataArray); 
        ctxVis.clearRect(0, 0, visCanvasLogical.width, visCanvasLogical.height);

        // 4096FFTに合わせたバンドの再定義
        const ranges = [
            { start: 1, end: 20 },   
            { start: 21, end: 170 },  
            { start: 171, end: 680 }, 
            { start: 681, end: 1600 } 
        ];

        const numBands = ranges.length;
        const barGap = 8; 
        const barWidth = (visCanvasLogical.width - (barGap * (numBands + 1))) / numBands; 
        const barRadius = 6; 

        for (let i = 0; i < numBands; i++) {
            const range = ranges[i];
            let sum = 0;
            for (let j = range.start; j <= range.end; j++) {
                sum += dataArray[j];
            }
            const avg = sum / (range.end - range.start + 1);
            
            const minBarHeight = 10; 
            let barHeight = (avg / 255) * visCanvasLogical.height;
            barHeight = Math.max(minBarHeight, barHeight);
            barHeight = Math.min(visCanvasLogical.height, barHeight); 

            const x = barGap + i * (barWidth + barGap);
            const y = visCanvasLogical.height - barHeight;

            ctxVis.fillStyle = bandColors[i];
            fillRoundedRect(ctxVis, x, y, barWidth, barHeight, barRadius);
        }
    }
</script>
</body>
</html>
