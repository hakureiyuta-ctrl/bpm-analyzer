<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BPM Analyzer Mini</title>
    <style>
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .card { 
            background: #1e293b; 
            padding: 2rem; 
            border-radius: 1.5rem; 
            text-align: center; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid #334155; 
        }
        .bpm-display { 
            font-size: 80px; 
            font-weight: 900; 
            color: #10b981; 
            margin: 10px 0; 
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); 
        }
        .status-badge { 
            display: inline-block; 
            padding: 4px 12px; 
            background: #0f172a; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            color: #94a3b8; 
            border: 1px solid #475569;
        }
        .progress-container { width: 100%; height: 6px; background: #0f172a; border-radius: 3px; margin: 15px 0; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: #38bdf8; transition: 0.1s; }
        
        canvas { width: 100%; height: 80px; background: #0f172a; border-radius: 8px; margin-bottom: 15px; }

        .controls { background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: left; }
        input[type=range] { width: 100%; height: 30px; accent-color: #38bdf8; }

        button { 
            background: #10b981; color: white; border: none; padding: 18px; 
            border-radius: 12px; font-weight: bold; width: 100%; font-size: 1.1rem;
        }
        #resetBtn { background: #475569; margin-top: 10px; padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup">
        <h2 style="margin-bottom:10px;">BPM Mic</h2>
        <p style="color:#94a3b8; font-size:0.8rem; margin-bottom:20px;">マイクで周囲のテンポを測定します</p>
        <button id="startBtn">🎤 測定を開始</button>
    </div>

    <div id="ui" style="display:none">
        <div id="status" class="status-badge">READY</div>
        <div class="bpm-display" id="bpm">--</div>
        
        <div class="controls">
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#94a3b8; margin-bottom:5px;">
                <span>解析バッファ</span>
                <span id="bufferLabel">4s</span>
            </div>
            <input type="range" id="bufferSlider" min="2" max="10" step="1" value="4">
        </div>

        <div class="progress-container"><div id="progressBar"></div></div>
        <canvas id="canvas"></canvas>

        <button id="resetBtn" onclick="location.reload()">終了 / リセット</button>
    </div>
</div>

<script>
    let audioCtx, analyser, dataArray;
    const SAMPLE_FREQ = 100; 
    let historySec = 4;
    let energyLog = [];
    let lastUpdate = 0;

    const startBtn = document.getElementById('startBtn');
    const bufferSlider = document.getElementById('bufferSlider');

    startBtn.onclick = async () => {
        try {
            // Androidのブラウザ制約により、ユーザー操作内でAudioContextを開始
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false } 
            });
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ui').style.display = 'block';

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            setInterval(analyze, 1000 / SAMPLE_FREQ);
            draw();
        } catch (err) {
            alert("マイクの使用が拒否されました。設定を確認してください。");
        }
    };

    bufferSlider.oninput = (e) => {
        historySec = parseInt(e.target.value);
        document.getElementById('bufferLabel').textContent = historySec + "s";
        energyLog = []; // バッファサイズ変更時はリセット
    };

    function analyze() {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);

        // 低周波領域（1~5番目のビン）の合計をエネルギーとする
        let energy = 0;
        for(let i=1; i<6; i++) energy += dataArray[i];
        energyLog.push(energy);

        const maxLen = SAMPLE_FREQ * historySec;
        if (energyLog.length > maxLen) energyLog.shift();

        // 進捗バー
        document.getElementById('progressBar').style.width = (energyLog.length / maxLen * 100) + "%";

        // バッファが溜まったら0.5秒おきにBPM計算
        if (energyLog.length >= maxLen && Date.now() - lastUpdate > 500) {
            calcBPM();
            lastUpdate = Date.now();
        }
    }

    function calcBPM() {
        const mean = energyLog.reduce((a, b) => a + b, 0) / energyLog.length;
        const normalized = energyLog.map(v => v - mean);

        let bestBPM = 0;
        let maxCorr = -Infinity;

        // 60-200 BPMの範囲で自己相関
        for (let bpm = 60; bpm <= 200; bpm++) {
            let step = (60 / bpm) * SAMPLE_FREQ;
            let corr = 0;
            let count = 0;

            for (let i = 0; i < normalized.length - Math.ceil(step); i++) {
                let j = i + step;
                let i1 = Math.floor(j), i2 = Math.ceil(j), frac = j - i1;
                let val = normalized[i1] * (1 - frac) + normalized[i2] * frac;
                corr += normalized[i] * val;
                count++;
            }
            
            if (corr / count > maxCorr) {
                maxCorr = corr / count;
                bestBPM = bpm;
            }
        }
        document.getElementById('bpm').textContent = bestBPM;
        document.getElementById('status').textContent = "LOCKED";
        document.getElementById('status').style.color = "#10b981";
    }

    function draw() {
        requestAnimationFrame(draw);
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "#38bdf8";
        ctx.lineWidth = 2;

        const step = canvas.width / (SAMPLE_FREQ * historySec);
        for (let i = 0; i < energyLog.length; i++) {
            let y = canvas.height - (energyLog[i] / 1000 * canvas.height);
            if (i === 0) ctx.moveTo(0, y);
            else ctx.lineTo(i * step, y);
        }
        ctx.stroke();
    }
</script>
</body>
</html>
