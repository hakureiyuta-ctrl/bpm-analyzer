<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハイボール濃さ判定チェッカー</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #222;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        #video-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }
        video {
            width: 100%;
            max-width: 400px;
            background-color: #000;
            border-radius: 8px;
        }
        /* 画面中央の測定エリアを示すターゲットマーク */
        #target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 2px solid #00ff00;
            transform: translate(-50%, -50%);
            box-sizing: border-box;
            pointer-events: none;
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            color: #f39c12; /* 琥珀色っぽい文字色 */
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>ハイボール濃さ判定</h1>
    <button id="startBtn">カメラを起動</button>

    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
        <div id="target-box"></div>
    </div>

    <div id="result">濃さ: -- %</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const resultDiv = document.getElementById('result');
        const startBtn = document.getElementById('startBtn');

        let isPlaying = false;

        // カメラの起動処理
        startBtn.addEventListener('click', async () => {
            try {
                // 背面カメラを優先して取得
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
                video.play();
                isPlaying = true;
                startBtn.style.display = 'none'; // 起動後はボタンを隠す
                
                // 映像の再生が始まったら解析ループを開始
                requestAnimationFrame(analyzeFrame);
            } catch (err) {
                alert('カメラの起動に失敗しました。権限を確認してください。\n' + err);
            }
        });

        // 映像フレームごとの解析処理
        function analyzeFrame() {
            if (!isPlaying || video.videoWidth === 0) {
                requestAnimationFrame(analyzeFrame);
                return;
            }

            // キャンバスのサイズをビデオに合わせる
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // ビデオの現在のフレームをキャンバスに描画
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 画面中央の1ピクセルの色を取得（精度を上げるならループで複数ピクセルの平均を取ります）
            const centerX = Math.floor(canvas.width / 2);
            const centerY = Math.floor(canvas.height / 2);
            const pixelData = ctx.getImageData(centerX, centerY, 1, 1).data;

            const r = pixelData[0];
            const g = pixelData[1];
            const b = pixelData[2];

            // RGBからHSVに変換して濃さを計算
            const hsv = rgbToHsv(r, g, b);
            const hue = hsv[0];        // 色相 (0〜360)
            const saturation = hsv[1]; // 彩度 (0.0〜1.0)

            // 【濃さの算出ロジック】
            // ストレートのウイスキーの彩度を 0.8 (80%) 程度と仮定
            const maxWhiskySaturation = 0.8;
            let concentration = (saturation / maxWhiskySaturation) * 100;

            if (concentration > 100) concentration = 100;

            // 色相がオレンジ/茶色系（ざっくり10〜60度）から大きく外れている場合は0%にする
            if (hue < 10 || hue > 60) {
                concentration = 0;
            }

            // 結果を画面に表示
            resultDiv.innerText = `濃さ: ${concentration.toFixed(1)} %`;

            // 次のフレームの処理を予約
            requestAnimationFrame(analyzeFrame);
        }

        // RGBをHSVに変換するヘルパー関数
        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const d = max - min;
            let h = 0;
            const s = max === 0 ? 0 : d / max;
            const v = max;

            if (max !== min) {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h * 360, s, v];
        }
    </script>
</body>
</html>
